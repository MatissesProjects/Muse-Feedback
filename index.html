<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse Feedback Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; }
        h1 { margin-top: 0; color: #38bdf8; }
        h2 { margin-top: 0; font-size: 1.1rem; color: #94a3b8; }
        .state-highlight { font-size: 2rem; font-weight: bold; color: #facc15; margin: 1rem 0; }
        .bar-container { margin-bottom: 0.75rem; }
        .bar-label { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.875rem; }
        .bar-bg { background: #334155; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: width 0.1s ease; }
        #ollama-response { background: #0f172a; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; min-height: 3rem; font-style: italic; white-space: pre-wrap; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-weight: bold; }
        button:hover { background: #0ea5e9; }
        .chart-container { margin-top: 2rem; height: 300px; position: relative; }
    </style>
</head>
<body>
    <h1>Muse Feedback Monitor</h1>
    
    <div class="grid">
        <div class="card">
            <h2>Current Cognitive State</h2>
            <div id="cognitive-state" class="state-highlight">Waiting for data...</div>
            <div id="horseshoe">Signal: ...</div>
        </div>

        <div class="card">
            <h2>Ollama Biofeedback</h2>
            <button onclick="askOllama()">Get Insight</button>
            <div id="ollama-response">Click for biofeedback based on your current state.</div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>Brainwave Trends</h2>
            <div class="chart-container">
                <canvas id="brainwaveChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Instant Levels</h2>
            <div class="bar-container">
                <div class="bar-label"><span>Gamma (Peak)</span><span id="gamma-val">0.00</span></div>
                <div class="bar-bg"><div id="gamma-bar" class="bar-fill" style="background: #f472b6;"></div></div>
            </div>
            <div class="bar-container">
                <div class="bar-label"><span>Beta (Focus)</span><span id="beta-val">0.00</span></div>
                <div class="bar-bg"><div id="beta-bar" class="bar-fill" style="background: #fb7185;"></div></div>
            </div>
            <div class="bar-container">
                <div class="bar-label"><span>Alpha (Calm)</span><span id="alpha-val">0.00</span></div>
                <div class="bar-bg"><div id="alpha-bar" class="bar-fill" style="background: #38bdf8;"></div></div>
            </div>
            <div class="bar-container">
                <div class="bar-label"><span>Theta (Deep)</span><span id="theta-val">0.00</span></div>
                <div class="bar-bg"><div id="theta-bar" class="bar-fill" style="background: #a78bfa;"></div></div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('brainwaveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Alpha', borderColor: '#38bdf8', data: [], tension: 0.4, pointRadius: 0 },
                    { label: 'Beta', borderColor: '#fb7185', data: [], tension: 0.4, pointRadius: 0 },
                    { label: 'Theta', borderColor: '#a78bfa', data: [], tension: 0.4, pointRadius: 0 },
                    { label: 'Gamma', borderColor: '#f472b6', data: [], tension: 0.4, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { min: 0, max: 2, grid: { color: '#334155' } }
                },
                plugins: { legend: { labels: { color: '#f8fafc' } } }
            }
        });

        const ws = new WebSocket(`ws://${window.location.host}/ws/data`);
        const maxPoints = 100;

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('cognitive-state').innerText = data.cognitive_state;
            
            // Update Bars
            updateBar('alpha', data.alpha);
            updateBar('beta', data.beta);
            updateBar('theta', data.theta);
            updateBar('gamma', data.gamma);
            
            // Update Chart
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(data.alpha);
            chart.data.datasets[1].data.push(data.beta);
            chart.data.datasets[2].data.push(data.theta);
            chart.data.datasets[3].data.push(data.gamma);

            if (chart.data.labels.length > maxPoints) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(ds => ds.data.shift());
            }
            chart.update('none'); // Update without animation for performance

            const horseshoe = data.horseshoe.map(v => v <= 1.0 ? '✅' : (v <= 2.0 ? '⚠️' : '❌')).join(' ');
            document.getElementById('horseshoe').innerText = `Signal Quality: ${horseshoe}`;
        };

        function updateBar(id, val) {
            const percentage = Math.min(Math.max(val * 50, 0), 100);
            document.getElementById(`${id}-bar`).style.width = `${percentage}%`;
            document.getElementById(`${id}-val`).innerText = val.toFixed(2);
        }

        async function askOllama() {
            const btn = document.querySelector('button');
            const respDiv = document.getElementById('ollama-response');
            btn.disabled = true;
            respDiv.innerText = "Thinking...";
            try {
                const response = await fetch('/ask-ollama', { method: 'POST' });
                const data = await response.json();
                respDiv.innerText = data.response;
            } catch (e) {
                respDiv.innerText = "Error contacting Ollama service.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
